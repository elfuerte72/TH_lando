worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Astro hashed assets — immutable cache 1 year
        location /_astro/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Static assets
        location ~* \.(ico|webp|jpg|jpeg|png|gif|svg|woff|woff2|ttf|eot|css|js)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Main location
        location / {
            try_files $uri $uri/ =404;
        }

        # Allow ACME challenge for SSL certificates (Amvera)
        location ^~ /.well-known/acme-challenge/ {
            allow all;
        }

        # Disable access to dotfiles
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
